<section class="section">
    <div class="section-header">
        <span class="section-icon" aria-hidden="true">&#128200;</span>
        <h2 class="section-title">{{ i18n.t().compareBakes }}</h2>
    </div>

    @if (allSessions().length < 2) {
        <p class="compare-empty">{{ i18n.t().noBakesYet }}</p>
    } @else {
        <div class="compare-selectors">
            <div class="compare-select">
                <label class="field-label">{{ i18n.t().selectBakeA }}</label>
                <div class="select-wrap">
                    <select [value]="sessionIdA()" (change)="onSelectA($any($event.target).value)">
                        <option value="" disabled hidden>—</option>
                        @for (s of allSessions(); track s.id) {
                            <option [value]="s.id">{{ sessionLabel(s) }}</option>
                        }
                    </select>
                    <span class="select-chevron" aria-hidden="true">&#9662;</span>
                </div>
            </div>

            <div class="compare-select">
                <label class="field-label">{{ i18n.t().selectBakeB }}</label>
                <div class="select-wrap">
                    <select [value]="sessionIdB()" (change)="onSelectB($any($event.target).value)">
                        <option value="" disabled hidden>—</option>
                        @for (s of allSessions(); track s.id) {
                            <option [value]="s.id">{{ sessionLabel(s) }}</option>
                        }
                    </select>
                    <span class="select-chevron" aria-hidden="true">&#9662;</span>
                </div>
            </div>
        </div>

        @if (rows().length > 0) {
            <div class="compare-table-wrap">
                <table class="compare-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>A</th>
                            <th>B</th>
                            <th>{{ i18n.t().difference }}</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (row of rows(); track row.label) {
                            <tr>
                                <td class="compare-label">{{ row.label }}</td>
                                <td class="compare-value">{{ row.valueA }}</td>
                                <td class="compare-value">{{ row.valueB }}</td>
                                <td class="compare-diff" [class]="row.diffClass">{{ row.diff }}</td>
                            </tr>
                        }
                    </tbody>
                </table>
            </div>
        }
    }
</section>
