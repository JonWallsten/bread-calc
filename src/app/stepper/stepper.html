<div class="stepper">
  <button
    class="stepper-btn stepper-minus"
    type="button"
    aria-label="Decrease"
    (click)="decrement()"
  >
    −
  </button>
  <input
    class="stepper-input"
    type="text"
    inputmode="decimal"
    [value]="editingValue() ?? displayNumber()"
    (focus)="onFocus($event)"
    (input)="onInput($event)"
    (blur)="onBlur()"
    (keydown.enter)="onEnter($event)"
  />
  @if (suffix()) {
  <span class="stepper-suffix">{{ suffix() }}</span>
  }
  <button
    class="stepper-btn stepper-plus"
    type="button"
    aria-label="Increase"
    (click)="increment()"
  >
    +
  </button>
</div>
