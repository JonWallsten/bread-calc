<div class="stepper">
    <button
        class="stepper-btn stepper-minus"
        type="button"
        [attr.aria-label]="i18n.t().decrease"
        [title]="i18n.t().decrease"
        (click)="decrement()"
    >
        −
    </button>
    <input
        class="stepper-input"
        type="text"
        inputmode="decimal"
        [value]="editingValue() ?? displayNumber()"
        (focus)="onFocus($event)"
        (input)="onInput($event)"
        (blur)="onBlur()"
        (keydown.enter)="onEnter($event)"
    />
    @if (suffix()) {
        <span class="stepper-suffix">{{ suffix() }}</span>
    }
    <button
        class="stepper-btn stepper-plus"
        type="button"
        [attr.aria-label]="i18n.t().increase"
        [title]="i18n.t().increase"
        (click)="increment()"
    >
        +
    </button>
</div>
