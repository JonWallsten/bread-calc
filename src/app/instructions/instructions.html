<section class="section">
  <div class="section-header">
    <h2 class="section-title">{{ i18n.t().instructions }}</h2>
  </div>

  @for (step of steps(); track step.title; let i = $index) {
  <div class="instruction-card" [class.completed]="completedSteps()[i]">
    <div class="instruction-header">
      <div class="instruction-title-group">
        <span class="instruction-title">{{ step.title }}</span>
      </div>
      <button
        class="check-btn"
        [class.checked]="completedSteps()[i]"
        type="button"
        (click)="toggleCompleted(i)"
        [attr.aria-label]="completedSteps()[i] ? i18n.t().markIncomplete(step.title) : i18n.t().markComplete(step.title)"
      >
        @if (completedSteps()[i]) {
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
        }
      </button>
    </div>
    <p class="instruction-body">{{ step.body }}</p>
    <div class="timer-row">
      @if (activeTimerIndex() !== i) {
      <button
        class="timer-btn"
        type="button"
        (click)="startTimer(i, step.minutes, step.title)"
      >
        {{ i18n.t().startTimer }}
        <span class="timer-btn-time">&middot; {{ step.time }}</span>
      </button>
      } @if (activeTimerIndex() === i) {
      <button class="timer-btn" type="button" (click)="togglePause()">
        {{ activeTimerPaused() ? i18n.t().resume : i18n.t().pause }}
      </button>
      <button class="timer-btn" type="button" (click)="resetTimer(i)">
        {{ i18n.t().reset }}
      </button>
      }
      <span class="timer-display">{{ timerDisplays()[i] || '' }}</span>
    </div>
  </div>
  }
</section>
